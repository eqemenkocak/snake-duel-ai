name: rakipyilan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # YENİLİK: Oyunun resimleri (Tekerlek, Taç, Gözlük vs.) görebilmesi için izin!
  assets:
    - assets/images/

# İkon oluşturma paketi için konfigürasyon
flutter_launcher_icons:
  android: "launcher_icon" 
  ios: true 
  image_path: "assets/images/ic_launcher.png" 
  adaptive_icon_background: "#000000" 
  adaptive_icon_foreground: "assets/images/ic_launcher.png"